name: Pipeline de Integração Contínua (CI)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:

  backend-validation:
    name: Build Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verificar Backend
        run: |
          if [ ! -f "pom.xml" ]; then
            echo "❌ pom.xml não encontrado"
            exit 1
          fi

      - uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: maven

      - name: Compilar Backend
        run: mvn clean package -DskipTests

  frontend-validation:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verificar Frontend
        run: |
          test -f frontend/package.json
          test -f frontend/public/index.html

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build